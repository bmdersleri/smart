name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (lint · typecheck · test · security)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scada-reporter/backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install -r requirements-dev.lock

      - name: Lint — ruff
        run: uv run --no-sync ruff check app/

      - name: Format — ruff
        run: uv run --no-sync ruff format --check app/

      - name: Type check — mypy
        run: uv run --no-sync mypy app/

      - name: Tests — pytest
        run: uv run --no-sync pytest tests/ -v --tb=short

      - name: Security — bandit
        run: uv run --no-sync bandit -r app/ -ll

  cli:
    name: Agent CLI (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scada-reporter/agent-harness

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install -e ../packages/scada-core -e . pytest

      - name: Tests — pytest
        run: uv run --no-sync pytest tests/ -v --tb=short

  frontend:
    name: Frontend (tsc · lint · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scada-reporter/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: scada-reporter/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Lint — ESLint
        run: pnpm lint

      - name: Tests — vitest
        run: pnpm test

  mcp:
    name: MCP scada (install · import · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-servers/mcp-scada

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        # Install into and run from .venv explicitly. mcp-scada has a pyproject,
        # so `uv run` would target the project env while setup-uv's VIRTUAL_ENV
        # points elsewhere — the mismatch left mcp_scada uninstalled. Pin both
        # install and run to .venv/bin/python to avoid the ambiguity.
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e ../../scada-reporter/packages/scada-core -e . pytest pytest-asyncio

      - name: Import smoke
        run: .venv/bin/python -c "import mcp_scada.server"

      - name: Tests — pytest
        run: .venv/bin/python -m pytest -v --tb=short

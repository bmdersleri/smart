name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (lint · typecheck · test · security)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scada-reporter/backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install -r requirements.txt ruff mypy bandit safety

      - name: Lint — ruff
        run: uv run --no-sync ruff check app/

      - name: Format — ruff
        run: uv run --no-sync ruff format --check app/

      - name: Type check — mypy
        run: uv run --no-sync mypy app/

      - name: Tests — pytest
        run: uv run --no-sync pytest tests/ -v --tb=short

      - name: Security — bandit
        run: uv run --no-sync bandit -r app/ -ll

  cli:
    name: Agent CLI (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scada-reporter/agent-harness

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install -e . pytest

      - name: Tests — pytest
        run: uv run --no-sync pytest tests/ -v --tb=short

  frontend:
    name: Frontend (tsc · lint · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scada-reporter/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: scada-reporter/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Lint — ESLint
        run: pnpm lint

      - name: Tests — vitest
        run: pnpm test

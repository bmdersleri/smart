# =============================================================================
# YEREL / GELİŞTİRME ALTYAPISI — ÜRETİM DAĞITIM ŞABLONU DEĞİLDİR
# =============================================================================
# Bu compose dosyası YALNIZCA yerel geliştirme ortamı için tasarlanmıştır.
# Varsayılan servisler: TimescaleDB (PostgreSQL), Redis, Prometheus, Portainer.
# Grafana Windows servis olarak desteklenir; Docker Grafana opsiyonel profildedir.
# Uygulama (API / collector / frontend) servisleri ve Dockerfile'lar Faz 4'e
# ertelenmiştir — bu dosyaya EKLEMEYIN.
#
# Üretim ortamında DB ve opsiyonel Docker Grafana parolalarını .env dosyasıyla mutlaka
# override edin. Bkz. docker/.env.example ve DOCKER.md.
# =============================================================================

services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: scada
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scada123}
      POSTGRES_DB: scada_reporter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scada -d scada_reporter"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    # host.docker.internal → Linux'ta host.docker.internal:host-gateway ile eşlenir.
    # Backend host sürecinde çalıştığından konteynerin host'a erişmesi gerekir.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"

  grafana:
    image: grafana/grafana:latest
    profiles: ["docker-grafana"]
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ALLOW_EMBEDDING: ${GF_SECURITY_ALLOW_EMBEDDING:-true}
      # Anonim erişim varsayılan KAPALI — bilinçli açmak için env ile true yapın.
      GF_AUTH_ANONYMOUS_ENABLED: ${GF_AUTH_ANONYMOUS_ENABLED:-false}
      GF_AUTH_ANONYMOUS_ORG_ROLE: ${GF_AUTH_ANONYMOUS_ORG_ROLE:-Viewer}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      # TimescaleDB datasource şifre interpolasyonu için (grafana/datasources/timescaledb.yml)
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scada123}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      db:
        condition: service_healthy
      prometheus:
        condition: service_started

  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data

volumes:
  pgdata:
  grafana-data:
  portainer-data:
  prometheus-data:

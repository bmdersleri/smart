# =============================================================================
# YEREL / GELİŞTİRME ALTYAPISI — ÜRETİM DAĞITIM ŞABLONU DEĞİLDİR
# =============================================================================
# Bu compose dosyası YALNIZCA yerel geliştirme ortamı için tasarlanmıştır.
# Başlatılan servisler: TimescaleDB (PostgreSQL), Redis, Grafana, Portainer.
# Uygulama (API / collector / frontend) servisleri ve Dockerfile'lar Faz 4'e
# ertelenmiştir — bu dosyaya EKLEMEYIN.
#
# Üretim ortamında DB ve Grafana parolalarını .env dosyasıyla mutlaka
# override edin. Bkz. docker/.env.example ve DOCKER.md.
# =============================================================================

services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: scada
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scada123}
      POSTGRES_DB: scada_reporter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scada -d scada_reporter"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      db:
        condition: service_healthy

  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data

volumes:
  pgdata:
  grafana-data:
  portainer-data:
